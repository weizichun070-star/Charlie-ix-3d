<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>查理九世 · 黑贝街3D</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{overflow:hidden;background:#000;font-family:monospace}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:rgba(255,255,255,0);border:2px solid rgba(255,255,255,0.6);border-radius:50%;pointer-events:none;z-index:10}
#info{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#666;font:11px monospace;z-index:10;background:rgba(0,0,0,0.5);padding:4px 12px;border-radius:4px}
#hint{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);color:#ffcc44;font:13px monospace;z-index:10;text-align:center;text-shadow:0 0 8px #000;background:rgba(0,0,0,0.6);padding:4px 16px;border-radius:4px}
#objective{position:fixed;top:16px;left:16px;color:#aaccff;font:12px monospace;z-index:10;text-shadow:0 0 6px #000;background:rgba(0,0,0,0.6);padding:6px 14px;border-radius:4px;max-width:360px}
#overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:100;flex-direction:column;align-items:center;justify-content:center}
#msg-box{background:#1a1a2e;border:1px solid #444;border-radius:8px;padding:28px 36px;max-width:440px;text-align:center}
#msg-text{color:#ddd;font-size:15px;line-height:1.6;white-space:pre-line;margin-bottom:16px}
#msg-input{display:none;background:#0a0a1a;border:1px solid #666;color:#ffcc44;font-size:20px;font-family:monospace;padding:8px 16px;text-align:center;width:120px;border-radius:4px;outline:none;margin-bottom:12px}
#msg-hint{color:#888;font-size:11px}
</style>  <script type="module" crossorigin src="/assets/index-C-KeO-6S.js"></script>
</head>
<body>
<div id="crosshair"></div>
<div id="info">WASD 移动 | 鼠标环顾 | 点击锁定 | E 交互</div>
<div id="hint"></div>
<div id="objective"></div>
<div id="overlay">
  <div id="msg-box">
    <div id="msg-text"></div>
    <input id="msg-input" type="text" maxlength="4" placeholder="输入密码..."/>
    <div id="msg-hint">Enter 确认 · Esc 关闭</div>
  </div>
</div>
</body></html>
